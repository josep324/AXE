<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXE Rewards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #050506;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .phone {
    width: 360px;
    background: #0E0E10;
    border-radius: 32px;
    padding: 14px;
    border: 1px solid #29292d;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .screen {
    background: #18181B;
    border-radius: 22px;
    overflow: hidden;
  }
  .toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: #D85A30;
    color: #fff;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all .35s cubic-bezier(.3,1.3,.5,1);
    z-index: 50;
    box-shadow: 0 8px 30px rgba(216,90,48,.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .header { padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; }
  .brand-tag { font-size: 11px; letter-spacing: 2.5px; color: #D85A30; font-weight: 700; }
  .brand-name { font-size: 19px; color: #fff; font-weight: 600; margin-top: 2px; }
  .points-pill {
    display: flex; align-items: center; gap: 7px;
    background: #D85A30; padding: 7px 14px; border-radius: 22px;
  }
  .points-pill svg { width: 16px; height: 16px; fill: #fff; }
  .points-val { font-size: 15px; color: #fff; font-weight: 700; }

  .profile { padding: 0 20px 18px; }
  .profile-card { background: #232327; border-radius: 16px; padding: 15px; }
  .profile-top { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; background: #D85A30;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar svg { width: 20px; height: 20px; fill: #fff; }
  .profile-name { font-size: 14px; color: #fff; font-weight: 600; }
  .profile-lvl { font-size: 11px; color: #9A9A9E; margin-top: 1px; }
  .to-next { margin-left: auto; font-size: 11px; color: #9A9A9E; text-align: right; }
  .bar { height: 7px; background: #38383D; border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; background: #D85A30; border-radius: 5px; transition: width .6s cubic-bezier(.3,1,.4,1); }

  .section-label { padding: 6px 20px 10px; display: flex; align-items: center; gap: 8px; }
  .section-label svg { width: 15px; height: 15px; fill: #D85A30; }
  .section-label .txt { font-size: 12.5px; color: #fff; font-weight: 600; }
  .section-label .hint { margin-left: auto; font-size: 10px; color: #9A9A9E; }

  .list { padding: 0 20px; }
  .challenge {
    background: #232327; border-radius: 13px; padding: 13px 15px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
    transition: opacity .3s, transform .3s;
  }
  .challenge .c-icon { width: 22px; height: 22px; fill: #F0997B; flex-shrink: 0; }
  .challenge .c-body { flex: 1; }
  .challenge .c-title { font-size: 12.5px; color: #fff; line-height: 1.3; }
  .challenge .c-pts { font-size: 10.5px; color: #9A9A9E; margin-top: 3px; }
  .do-btn {
    font-size: 11px; color: #D85A30; border: 1px solid #D85A30;
    background: transparent; padding: 6px 13px; border-radius: 14px;
    cursor: pointer; font-weight: 600; flex-shrink: 0; transition: all .2s;
  }
  .do-btn:hover { background: #D85A30; color: #fff; }
  .done-mark { width: 22px; height: 22px; fill: #1D9E75; flex-shrink: 0; }
  .challenge.completed { opacity: .55; }

  .rewards-grid { padding: 0 20px 18px; display: flex; gap: 10px; }
  .reward {
    flex: 1; background: #232327; border-radius: 13px; padding: 13px 8px;
    text-align: center; cursor: pointer; transition: all .2s; border: 1px solid transparent;
  }
  .reward:hover { border-color: #D85A30; transform: translateY(-2px); }
  .reward svg { width: 24px; height: 24px; fill: #fff; }
  .reward .r-title { font-size: 11px; color: #fff; margin: 8px 0 2px; line-height: 1.25; }
  .reward .r-cost { font-size: 10px; color: #D85A30; font-weight: 600; }
  .reward.locked { opacity: .4; cursor: not-allowed; }
  .reward.locked:hover { border-color: transparent; transform: none; }

  .nav { background: #0E0E10; padding: 13px 0; display: flex; justify-content: space-around; }
  .nav svg { width: 23px; height: 23px; fill: #6A6A6E; }
  .nav svg.active { fill: #D85A30; }

  .reset {
    margin: 14px auto 0; display: block; background: transparent; border: none;
    color: #555; font-size: 11px; cursor: pointer; text-decoration: underline;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="phone">
  <div class="screen">

    <div class="header">
      <div>
        <div class="brand-tag">AXE</div>
        <div class="brand-name">Rewards</div>
      </div>
      <div class="points-pill">
        <svg viewBox="0 0 24 24"><path d="M12 2c1 3-1 5-2 7-1 2 0 4 2 4s3-2 2-4c2 1 4 4 4 7a8 8 0 1 1-16 0c0-4 3-7 4-10 1 2 2 3 2 6 1-3 0-6-2-10z"/></svg>
        <span class="points-val" id="points">2480</span>
      </div>
    </div>

    <div class="profile">
      <div class="profile-card">
        <div class="profile-top">
          <div class="avatar"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v2h18v-2c0-3.5-4-6-9-6z"/></svg></div>
          <div>
            <div class="profile-name">Hi, Marc</div>
            <div class="profile-lvl" id="lvl-label">Level 4 · Icon</div>
          </div>
          <div class="to-next"><span id="to-next">520</span> to next level</div>
        </div>
        <div class="bar"><div class="bar-fill" id="bar" style="width:72%"></div></div>
      </div>
    </div>

    <div class="section-label">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 5.4 5.6.5-4.2 3.7 1.3 5.4L12 19.8 6.9 22.4 8.2 17 4 13.3l5.6-.5z"/></svg>
      <span class="txt">Your challenges this week</span>
      <span class="hint">picked by AI</span>
    </div>

    <div class="list" id="challenges"></div>

    <div class="section-label">
      <svg viewBox="0 0 24 24"><path d="M20 7h-3.2A3 3 0 0 0 12 3a3 3 0 0 0-4.8 4H4v4h16zM4 13v7h7v-7zm9 0v7h7v-7z"/></svg>
      <span class="txt">Redeem your points</span>
    </div>

    <div class="rewards-grid" id="rewards"></div>

    <div class="nav">
      <svg class="active" viewBox="0 0 24 24"><path d="M12 3 2 12h3v8h5v-5h4v5h5v-8h3z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M18 2H6v2H3v3a4 4 0 0 0 4 4 5 5 0 0 0 4 2.9V18H8v2h8v-2h-3v-4.1A5 5 0 0 0 17 11a4 4 0 0 0 4-4V4h-3zM5 7V6h1v3a2 2 0 0 1-1-2zm14 0a2 2 0 0 1-1 2V6h1z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M20 7h-3.2A3 3 0 0 0 12 3a3 3 0 0 0-4.8 4H4v4h16zM4 13v7h7v-7zm9 0v7h7v-7z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v2h18v-2c0-3.5-4-6-9-6z"/></svg>
    </div>

  </div>
  <button class="reset" onclick="resetApp()">Reset demo</button>
</div>

<script>
  const ICONS = {
    music: '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
    camera: '<path d="M9 3 7.2 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 3zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/>',
    pin: '<path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/>',
    check: '<path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-1.2 14.2-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4z"/>',
    ticket: '<path d="M20 7h-3.2A3 3 0 0 0 12 3a3 3 0 0 0-4.8 4H4v4h16zM4 13v7h7v-7zm9 0v7h7v-7z"/>',
    spray: '<path d="M9 2h2v3H9zM7 6h6v3H7zm-1 4h8v12H6zm2 3v6h4v-6z"/>',
    headphones: '<path d="M12 3a9 9 0 0 0-9 9v6a3 3 0 0 0 3 3h2v-7H5v-2a7 7 0 0 1 14 0v2h-3v7h2a3 3 0 0 0 3-3v-6a9 9 0 0 0-9-9z"/>'
  };
  const svg = k => '<svg class="c-icon" viewBox="0 0 24 24">'+ICONS[k]+'</svg>';

  // --- gamification config ---
  const LEVEL_SIZE = 1000;        // points per level
  const START_LEVEL_BASE = 4000;  // level 4 starts here

  let challenges = [
    { id:1, icon:'music',  title:'Listen to the Bizarrap x AXE playlist', pts:150, done:true },
    { id:2, icon:'camera', title:'Share your look with the AXE filter',   pts:200, done:false },
    { id:3, icon:'pin',    title:'Check in at the Barcelona pop-up',        pts:300, done:false }
  ];
  const REWARDS = [
    { id:'vip',     icon:'ticket',     title:'VIP event access',   cost:3000 },
    { id:'pack',    icon:'spray',      title:'Limited edition pack', cost:1800 },
    { id:'content', icon:'headphones', title:'Exclusive content',    cost:1200 }
  ];

  let points = 2480;
  const redeemed = new Set();

  function level() { return Math.floor(points / LEVEL_SIZE); }
  function progressPct() { return Math.round((points % LEVEL_SIZE) / LEVEL_SIZE * 100); }
  function toNext() { return LEVEL_SIZE - (points % LEVEL_SIZE); }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function render() {
    document.getElementById('points').textContent = points.toLocaleString('en-US');
    document.getElementById('lvl-label').textContent = 'Level ' + level() + ' · Icon';
    document.getElementById('to-next').textContent = toNext().toLocaleString('en-US');
    document.getElementById('bar').style.width = progressPct() + '%';

    const cl = document.getElementById('challenges');
    cl.innerHTML = '';
    challenges.forEach(c => {
      const row = document.createElement('div');
      row.className = 'challenge' + (c.done ? ' completed' : '');
      row.innerHTML = svg(c.icon) +
        '<div class="c-body"><div class="c-title">'+c.title+'</div><div class="c-pts">+'+c.pts+' points</div></div>' +
        (c.done
          ? '<svg class="done-mark" viewBox="0 0 24 24">'+ICONS.check+'</svg>'
          : '<button class="do-btn" data-id="'+c.id+'">Do it</button>');
      cl.appendChild(row);
    });
    cl.querySelectorAll('.do-btn').forEach(b =>
      b.onclick = () => complete(parseInt(b.dataset.id)));

    const rg = document.getElementById('rewards');
    rg.innerHTML = '';
    REWARDS.forEach(r => {
      const got = redeemed.has(r.id);
      const can = points >= r.cost && !got;
      const card = document.createElement('div');
      card.className = 'reward' + (can ? '' : ' locked');
      card.innerHTML = '<svg viewBox="0 0 24 24">'+ICONS[r.icon]+'</svg>' +
        '<div class="r-title">'+r.title+'</div>' +
        '<div class="r-cost">'+(got ? 'Unlocked' : r.cost.toLocaleString('en-US')+' pts')+'</div>';
      if (can) card.onclick = () => redeem(r);
      rg.appendChild(card);
    });
  }

  function complete(id) {
    const c = challenges.find(x => x.id === id);
    if (!c || c.done) return;
    const before = level();
    c.done = true;
    points += c.pts;
    render();
    if (level() > before) toast('Level up! You reached level ' + level());
    else toast('+' + c.pts + ' points');
  }

  function redeem(r) {
    if (points < r.cost) return;
    points -= r.cost;
    redeemed.add(r.id);
    render();
    toast('Redeemed: ' + r.title);
  }

  function resetApp() {
    points = 2480;
    redeemed.clear();
    challenges = [
      { id:1, icon:'music',  title:'Listen to the Bizarrap x AXE playlist', pts:150, done:true },
      { id:2, icon:'camera', title:'Share your look with the AXE filter',   pts:200, done:false },
      { id:3, icon:'pin',    title:'Check in at the Barcelona pop-up',        pts:300, done:false }
    ];
    render();
  }

  render();
</script>
</body>
</html>
